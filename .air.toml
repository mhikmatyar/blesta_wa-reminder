root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/api ./cmd/api"
bin = "tmp/api"
full_bin = "tmp/api"
include_ext = ["go", "tpl", "tmpl", "html", "sql"]
exclude_dir = ["tmp", "vendor", ".git"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "2s"

[log]
time = true

[misc]
clean_on_exit = true
