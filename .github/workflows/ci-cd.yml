name: CI CD VPS Deploy

on:
  push:
    branches:
      - main

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Run backend tests
        run: go test ./...

      - name: Run frontend tests
        run: node --test web/admin/app.test.js

      - name: Build Linux amd64 binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o dist/blesta-wa-reminder ./cmd/api

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload binary to VPS
        run: |
          scp -P "${{ secrets.VPS_PORT }}" dist/blesta-wa-reminder \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/blesta-wa-reminder/blesta-wa-reminder.new"

      - name: Activate new binary and restart service
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "chmod +x /opt/blesta-wa-reminder/blesta-wa-reminder.new && \
             mv /opt/blesta-wa-reminder/blesta-wa-reminder.new /opt/blesta-wa-reminder/blesta-wa-reminder && \
             systemctl restart wa-reminder && \
             systemctl is-active --quiet wa-reminder"
